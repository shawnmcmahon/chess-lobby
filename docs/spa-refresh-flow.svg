<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-label="SPA refresh flow on deep link">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#475569"/>
    </marker>
    <marker id="arrow-return" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-react" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="920" height="520" fill="#f8fafc"/>

  <text x="460" y="36" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700" fill="#0f172a">
    SPA refresh on a deep link
  </text>
  <text x="460" y="60" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#64748b">
    Example: user refreshes or bookmarks /dashboard
  </text>

  <!-- AWS group -->
  <rect x="230" y="88" width="360" height="372" rx="16" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="252" y="114" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" fill="#c2410c">AWS (static hosting)</text>

  <!-- Participants -->
  <g filter="url(#shadow)">
    <rect x="40" y="96" width="130" height="52" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="105" y="120" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Browser</text>
    <text x="105" y="138" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#64748b">address bar: /dashboard</text>

    <rect x="260" y="130" width="140" height="44" rx="10" fill="#ffffff" stroke="#fdba74"/>
    <text x="330" y="158" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">CloudFront</text>

    <rect x="480" y="130" width="90" height="44" rx="10" fill="#ffffff" stroke="#fdba74"/>
    <text x="525" y="158" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">S3</text>

    <rect x="650" y="96" width="220" height="52" rx="10" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="760" y="120" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">React (client)</text>
    <text x="760" y="138" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#64748b">Router + page components</text>
  </g>

  <!-- Lifelines -->
  <line x1="105" y1="148" x2="105" y2="430" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="330" y1="174" x2="330" y2="430" stroke="#fdba74" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="525" y1="174" x2="525" y2="430" stroke="#fdba74" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="760" y1="148" x2="760" y2="430" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Step labels -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600">
    <!-- 1 -->
    <circle cx="56" cy="188" r="12" fill="#0f172a"/>
    <text x="56" y="192" text-anchor="middle" fill="#ffffff" font-size="10">1</text>
    <rect x="128" y="176" width="188" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="222" y="191" text-anchor="middle" fill="#334155">GET /dashboard</text>

    <!-- 2 -->
    <circle cx="56" cy="238" r="12" fill="#0f172a"/>
    <text x="56" y="242" text-anchor="middle" fill="#ffffff" font-size="10">2</text>
    <rect x="348" y="226" width="162" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="429" y="241" text-anchor="middle" fill="#334155">lookup /dashboard (missing)</text>

    <!-- 3 -->
    <circle cx="56" cy="288" r="12" fill="#94a3b8"/>
    <text x="56" y="292" text-anchor="middle" fill="#ffffff" font-size="10">3</text>
    <rect x="348" y="276" width="52" height="22" rx="11" fill="#fef2f2" stroke="#fecaca"/>
    <text x="374" y="291" text-anchor="middle" fill="#b91c1c">404</text>

    <!-- 4 -->
    <circle cx="56" cy="338" r="12" fill="#0f172a"/>
    <text x="56" y="342" text-anchor="middle" fill="#ffffff" font-size="10">4</text>
    <rect x="128" y="326" width="188" height="22" rx="11" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="222" y="341" text-anchor="middle" fill="#047857">200 + index.html (SPA fallback)</text>

    <!-- 5 -->
    <circle cx="56" cy="388" r="12" fill="#7c3aed"/>
    <text x="56" y="392" text-anchor="middle" fill="#ffffff" font-size="10">5</text>
    <rect x="128" y="376" width="600" height="22" rx="11" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="428" y="391" text-anchor="middle" fill="#6d28d9">load JS bundle, mount &lt;App /&gt; into #root</text>

    <!-- 6 -->
    <circle cx="56" cy="438" r="12" fill="#7c3aed"/>
    <text x="56" y="442" text-anchor="middle" fill="#ffffff" font-size="10">6</text>
    <rect x="620" y="426" width="280" height="22" rx="11" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="760" y="441" text-anchor="middle" fill="#6d28d9">BrowserRouter ’ Dashboard</text>
  </g>

  <!-- Arrows -->
  <!-- 1 Browser -> CloudFront -->
  <line x1="105" y1="188" x2="318" y2="188" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2 CloudFront -> S3 -->
  <line x1="330" y1="238" x2="513" y2="238" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3 S3 -> CloudFront (404 return) -->
  <line x1="513" y1="288" x2="342" y2="288" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-return)"/>

  <!-- 4 CloudFront -> Browser -->
  <line x1="318" y1="338" x2="105" y2="338" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5 Browser -> React -->
  <line x1="105" y1="388" x2="748" y2="388" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-react)"/>

  <!-- 6 React self -->
  <path d="M 760 418 L 820 418 L 820 448 L 760 448" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-react)"/>

  <!-- Legend -->
  <rect x="40" y="472" width="840" height="36" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="68" y1="490" x2="98" y2="490" stroke="#475569" stroke-width="2"/>
  <text x="108" y="494" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569">HTTPS request / response</text>
  <line x1="280" y1="490" x2="310" y2="490" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="320" y="494" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569">S3 miss (no file for path)</text>
  <line x1="500" y1="490" x2="530" y2="490" stroke="#7c3aed" stroke-width="2"/>
  <text x="540" y="494" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569">Client-side routing (no new HTML document)</text>
</svg>
