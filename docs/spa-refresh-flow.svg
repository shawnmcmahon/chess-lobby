<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 380" role="img" aria-label="SPA refresh flow on deep link">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#475569"/>
    </marker>
    <marker id="arrow-return" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-react" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1040" height="380" fill="#f8fafc"/>

  <text x="520" y="36" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700" fill="#0f172a">
    SPA refresh on a deep link
  </text>
  <text x="520" y="60" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#64748b">
    Example: user refreshes or bookmarks /dashboard
  </text>

  <!-- AWS group -->
  <rect x="180" y="88" width="520" height="200" rx="16" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="202" y="114" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" fill="#c2410c">AWS static hosting</text>

  <!-- React group -->
  <rect x="740" y="88" width="260" height="200" rx="16" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="762" y="114" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" fill="#6d28d9">Browser (client)</text>

  <g filter="url(#shadow)">
    <!-- Browser -->
    <rect x="40" y="148" width="120" height="56" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="100" y="172" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Browser</text>
    <text x="100" y="190" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#64748b">GET /dashboard</text>

    <!-- CloudFront -->
    <rect x="220" y="148" width="130" height="56" rx="10" fill="#ffffff" stroke="#fdba74"/>
    <text x="285" y="172" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">CloudFront</text>
    <text x="285" y="190" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#64748b">CDN edge</text>

    <!-- S3 -->
    <rect x="400" y="148" width="110" height="56" rx="10" fill="#ffffff" stroke="#fdba74"/>
    <text x="455" y="172" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">S3</text>
    <text x="455" y="190" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#64748b">no /dashboard file</text>

    <!-- index.html return -->
    <rect x="560" y="148" width="120" height="56" rx="10" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="620" y="172" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#047857">index.html</text>
    <text x="620" y="190" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#047857">SPA fallback</text>

    <!-- React mount -->
    <rect x="760" y="148" width="220" height="56" rx="12" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="870" y="172" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">React + Router</text>
    <text x="870" y="190" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#64748b">/dashboard renders Dashboard</text>
  </g>

  <!-- Step numbers -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="700">
    <circle cx="100" cy="128" r="11" fill="#0f172a"/>
    <text x="100" y="132" text-anchor="middle" fill="#ffffff">1</text>
    <circle cx="285" cy="128" r="11" fill="#0f172a"/>
    <text x="285" y="132" text-anchor="middle" fill="#ffffff">2</text>
    <circle cx="455" cy="128" r="11" fill="#94a3b8"/>
    <text x="455" y="132" text-anchor="middle" fill="#ffffff">3</text>
    <circle cx="620" cy="128" r="11" fill="#0f172a"/>
    <text x="620" y="132" text-anchor="middle" fill="#ffffff">4</text>
    <circle cx="870" cy="128" r="11" fill="#7c3aed"/>
    <text x="870" y="132" text-anchor="middle" fill="#ffffff">5</text>
  </g>

  <!-- Flow arrows (main row) -->
  <line x1="160" y1="176" x2="218" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="176" x2="398" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="176" x2="558" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="680" y1="176" x2="758" y2="176" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-react)"/>

  <!-- 404 return (dashed, below main row) -->
  <path d="M 455 230 L 455 252 L 285 252 L 285 206" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-return)"/>
  <rect x="330" y="238" width="36" height="18" rx="9" fill="#fef2f2" stroke="#fecaca"/>
  <text x="348" y="251" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600" fill="#b91c1c">404</text>

  <!-- Step captions -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569">
    <text x="100" y="228" text-anchor="middle">Request path</text>
    <text x="285" y="228" text-anchor="middle">Forward to S3</text>
    <text x="455" y="228" text-anchor="middle">File missing</text>
    <text x="620" y="228" text-anchor="middle">Return shell (HTTP 200)</text>
    <text x="870" y="228" text-anchor="middle">Client picks route</text>
  </g>

  <!-- Legend -->
  <rect x="40" y="308" width="960" height="52" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="68" y1="334" x2="98" y2="334" stroke="#475569" stroke-width="2"/>
  <text x="108" y="338" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569">HTTPS through CloudFront</text>
  <line x1="300" y1="334" x2="330" y2="334" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="340" y="338" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569">S3 miss triggers SPA fallback (403/404 to index.html)</text>
  <line x1="680" y1="334" x2="710" y2="334" stroke="#7c3aed" stroke-width="2"/>
  <text x="720" y="338" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569">React Router matches URL without a new page load</text>
</svg>
