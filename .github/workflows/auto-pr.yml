name: Auto Pull Request

on:
  push:
    branches-ignore:
      - main
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create pull request for branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace("refs/heads/", "");
            const { owner, repo } = context.repo;

            const { data: openPrs } = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${branch}`,
              state: "open",
            });

            if (openPrs.length > 0) {
              core.info(`Open PR already exists: #${openPrs[0].number}`);
              return;
            }

            const title = branch
              .replace(/^(feature|fix|chore)\//, "")
              .split(/[-_/]+/)
              .filter(Boolean)
              .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
              .join(" ");

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title: title || branch,
              head: branch,
              base: "main",
              body: [
                "## Summary",
                `- Changes from branch \`${branch}\``,
                "",
                "## Test plan",
                "- [ ] CI passes",
                "- [ ] Manually verify the affected feature",
              ].join("\n"),
            });

            core.info(`Created pull request #${pr.number}: ${pr.html_url}`);
