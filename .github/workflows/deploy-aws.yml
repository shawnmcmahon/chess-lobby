# Minimal demo deploy: React → S3+CloudFront, Convex (built-in engine — no Stockfish on AWS)
# Configure repository secrets before running:
#   AWS_ROLE_ARN, AWS_S3_BUCKET, AWS_CLOUDFRONT_DISTRIBUTION_ID
#   VITE_CONVEX_URL, CONVEX_DEPLOY_KEY
# See docs/deploy-demo.md for one-time AWS + Convex setup.

name: Deploy AWS

on:
  workflow_dispatch:

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build:web
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - run: |
          aws s3 sync apps/web/dist s3://${{ secrets.AWS_S3_BUCKET }} --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "robots.txt"
          aws s3 cp apps/web/dist/index.html s3://${{ secrets.AWS_S3_BUCKET }}/index.html \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html"
          aws s3 cp apps/web/dist/robots.txt s3://${{ secrets.AWS_S3_BUCKET }}/robots.txt \
            --cache-control "public, max-age=86400" \
            --content-type "text/plain"
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/index.html"

  deploy-convex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
